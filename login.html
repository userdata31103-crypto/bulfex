<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BULFEX Login</title>
<style>
  *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0b1120;
overflow:hidden;
position:relative;
}

/* Animated Background */

.bg-animation{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
background:
radial-gradient(circle at 20% 20%, #00e5ff33, transparent 25%),
radial-gradient(circle at 80% 30%, #00ff8833, transparent 25%),
radial-gradient(circle at 50% 80%, #7c3aed33, transparent 25%);
animation:bgMove 10s ease-in-out infinite alternate;
}

@keyframes bgMove{
from{
transform:scale(1) rotate(0deg);
}
to{
transform:scale(1.2) rotate(5deg);
}
}

/* Login Box */

.login-box{
position:relative;
width:90%;
max-width:420px;
padding:40px 30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:25px;
overflow:hidden;
z-index:1;
}

/* Rotating Border */

.login-box::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:conic-gradient(
transparent,
#00e5ff,
transparent,
#00ff88,
transparent
);
animation:rotateBorder 5s linear infinite;
top:-50%;
left:-50%;
}

.login-box::after{
content:"";
position:absolute;
inset:3px;
background:#111827;
border-radius:22px;
z-index:-1;
}

@keyframes rotateBorder{
100%{
transform:rotate(360deg);
}
}

.login-box h1{
text-align:center;
color:#fff;
font-size:32px;
margin-bottom:10px;
}

.login-box p{
text-align:center;
color:#cbd5e1;
margin-bottom:30px;
}
.login-box,
.login-box{
z-index:10;
}
/* Inputs */

.input-box{
position:relative;
margin-bottom:25px;
}

.input-box input{
width:100%;
padding:15px;
border:none;
outline:none;
background:#1e293b;
border-radius:12px;
color:#fff;
font-size:15px;
}

.input-box label{
position:absolute;
left:15px;
top:15px;
color:#94a3b8;
pointer-events:none;
transition:.3s;
}

.input-box input:focus + label,
.input-box input:valid + label{
top:-10px;
left:10px;
font-size:12px;
padding:2px 8px;
background:#111827;
border-radius:10px;
color:#00e5ff;
}

/* Login Button */

.login-btn{
position:relative;
width:100%;
height:55px;
border:none;
border-radius:15px;
background:transparent;
cursor:pointer;
overflow:hidden;
}

.login-btn::before{
content:"";
position:absolute;
width:300%;
height:300%;
background:conic-gradient(
transparent,
#00e5ff,
transparent,
#00ff88,
transparent
);
animation:rotateBtn 2s linear infinite;
top:-100%;
left:-100%;
}

.login-btn::after{
content:"";
position:absolute;
inset:3px;
background:#111827;
border-radius:12px;
}

.login-btn span{
position:relative;
z-index:2;
color:#fff;
font-size:16px;
font-weight:bold;
letter-spacing:1px;
}

@keyframes rotateBtn{
100%{
transform:rotate(360deg);
}
}

.bottom-text{
margin-top:20px;
text-align:center;
color:#cbd5e1;
}

.bottom-text a{
color:#00e5ff;
text-decoration:none;
font-weight:bold;
}
/* Fix Login Page Links */

.login-box{
position:relative;
z-index:10;
}

.login-box::before,
.login-box::after{
pointer-events:none;
}

.bottom-text{
position:relative;
z-index:9999;
}

.bottom-text a{
position:relative;
z-index:9999;
pointer-events:auto;
cursor:pointer;
}
</style>

</head>
<body>

<div class="bg-animation"></div>

<div class="login-box">

<h1>BULFEX</h1>
<p>Welcome Back</p>

<form id="loginForm">

<div class="input-box">
<input type="email" id="email" required>
<label>Email Address</label>
</div>

<div class="input-box">
<input type="password" id="password" required>
<label>Password</label>
</div>

<button type="submit" class="login-btn">
<span>LOGIN</span>
</button>

</form>

<div class="bottom-text">
Don't have an account?
<a href="signup.html">Sign Up</a>
</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBp81poxZsi309XEDDBKWmTrzD91Et7lNE",
authDomain: "bulfex.firebaseapp.com",
projectId: "bulfex",
storageBucket: "bulfex.firebasestorage.app",
messagingSenderId: "217833665645",
appId: "1:217833665645:web:c03a94745887a2be033b64",
measurementId: "G-TXMXNZDMMW"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document
.getElementById("loginForm")
.addEventListener("submit", async (e) => {

e.preventDefault();

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try {

await signInWithEmailAndPassword(
auth,
email,
password
);

Swal.fire({
icon: "success",
title: "Login Successful",
text: "Welcome Back!",
confirmButtonText: "Continue"
}).then(() => {
window.location.href = "dashboard.html";
});
} catch (error) {

Swal.fire({
icon: "error",
title: "Error",
text: error.message
});

}

});
</script>
</script>
</body>
</html>
