<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>deposit request</title>
  <style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1120;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
position:relative;
}

/* Background Animation */

.bg-animation{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b1120;
overflow:hidden;
z-index:0;
}

.bg-animation::before{
content:"";
position:absolute;
width:700px;
height:700px;
background:#00e5ff;
border-radius:50%;
filter:blur(180px);
top:-250px;
left:-250px;
opacity:.4;
animation:glow1 12s linear infinite alternate;
}

.bg-animation::after{
content:"";
position:absolute;
width:700px;
height:700px;
background:#00ff88;
border-radius:50%;
filter:blur(180px);
bottom:-250px;
right:-250px;
opacity:.4;
animation:glow2 12s linear infinite alternate;
}

@keyframes glow1{
0%{transform:translate(0,0);}
100%{transform:translate(250px,250px);}
}

@keyframes glow2{
0%{transform:translate(0,0);}
100%{transform:translate(-250px,-250px);}
}

/* Main Card */

.payment-container{
position:relative;
width:100%;
max-width:450px;
padding:30px;
border-radius:25px;
overflow:hidden;
z-index:2;
}

.payment-container::before{
content:"";
position:absolute;
width:220%;
height:220%;
top:-60%;
left:-60%;
background:conic-gradient(
transparent,
#00e5ff,
transparent,
#00ff88,
transparent
);
animation:borderRotate 5s linear infinite;
}

.payment-container::after{
content:"";
position:absolute;
inset:3px;
background:#111827;
border-radius:22px;
z-index:0;
}

.payment-container *{
position:relative;
z-index:2;
}

@keyframes borderRotate{
100%{
transform:rotate(360deg);
}
}

/* Header */

.header{
text-align:center;
margin-bottom:20px;
}

.header h1{
color:#00e5ff;
font-size:34px;
margin-bottom:8px;
text-shadow:0 0 20px #00e5ff;
}

.header p{
color:#cbd5e1;
}

/* Note */

.note-box{
background:#1e293b;
padding:18px;
border-radius:15px;
margin-bottom:20px;
}

.note-box h3{
color:#00e5ff;
margin-bottom:10px;
}

.note-box p{
color:#cbd5e1;
margin-bottom:8px;
}

/* Selected Plan */

.selected-plan{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
margin-bottom:20px;
}

.selected-plan h2{
color:#fff;
margin-bottom:10px;
}

.selected-plan h3{
color:#00ff88;
font-size:28px;
}

/* Payment Methods */

.payment-methods{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:20px;
}

.payment-methods button{
height:55px;
border:none;
border-radius:15px;
background:#1e293b;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.payment-methods button:hover{
transform:translateY(-2px);
box-shadow:0 0 15px #00e5ff;
}

/* Payment Details */

.payment-details{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
text-align:center;
}

.payment-details h3{
color:white;
margin-bottom:15px;
word-break:break-word;
}

/* Copy Button */

#copyBtn{
width:100%;
height:50px;
border:none;
border-radius:12px;
background:#00e5ff;
color:#111827;
font-weight:bold;
cursor:pointer;
}

/* Input */

.input-box{
margin-bottom:20px;
}

.input-box input{
width:100%;
height:55px;
padding:15px;
border:none;
outline:none;
background:#1e293b;
border-radius:12px;
color:white;
font-size:15px;
}

/* Submit Button */

.submit-btn{
width:100%;
height:55px;
border:none;
border-radius:15px;
background:#00ff88;
color:#111827;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* Mobile */

@media(max-width:480px){

.payment-container{
padding:20px;
}

.payment-methods{
grid-template-columns:1fr;
}

.header h1{
font-size:28px;
}
.back-btn{
position: absolute;
top:20px;
left:20px;
width:45px;
height:45px;
background:#00e5ff;
color:#111827;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
font-size:24px;
font-weight:bold;
box-shadow:0 0 15px #00e5ff;
transition:.3s;
z-index:9999;
}

.back-btn:hover{
transform:scale(1.1);
box-shadow:0 0 25px #00e5ff;
}
}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <a href="dashboard.html" class="back-btn">
←
</a>
  <div class="bg-animation"></div>

<div class="payment-container">

<div class="header">
<h1>BULFEX PAYMENT</h1>
<p>Complete Your Deposit</p>
</div>

<!-- Note -->

<div class="note-box">

<h3>⚠ Important Instructions</h3>

<p>• Please send exact amount.</p>

<p>• Copy the correct account number.</p>

<p>• Enter valid Transaction ID.</p>

<p>• Approval time 5 to 30 minutes.</p>

<p>• Wrong details may delay approval.</p>

</div>

<!-- Selected Plan -->

<div class="selected-plan">

<h2 id="planName">
Loading Plan...
</h2>

<h3 id="planAmount">
0 PKR
</h3>

</div>

<!-- Payment Methods -->

<div class="payment-methods">

<button
type="button"
id="easyBtn">

💚 Easypaisa

</button>

<button
type="button"
id="jazzBtn">

💛 JazzCash

</button>

</div>

<!-- Payment Details -->

<div class="payment-details">

<h3 id="holderName">

👤 Account Holder:
-

</h3>

<h3 id="paymentNumber">

📱 Number:
-

</h3>

<button
type="button"
id="copyBtn">

📋 Copy Number

</button>

</div>

<!-- Deposit Form -->

<form id="depositForm">

<div class="input-box">

<input
type="text"
id="transactionId"
required
placeholder="Transaction ID">

</div>

<button
type="submit"
class="submit-btn">

SUBMIT REQUEST

</button>

</form>

</div>
<script type="module">
  import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";


/* Firebase Config */

const firebaseConfig = {

apiKey: "AIzaSyBp81poxZsi309XEDDBKWmTrzD91Et7lNE",

authDomain: "bulfex.firebaseapp.com",

projectId: "bulfex",

storageBucket: "bulfex.firebasestorage.app",

messagingSenderId: "217833665645",

appId: "1:217833665645:web:c03a94745887a2be033b64",

measurementId: "G-TXMXNZDMMW"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);


/* Load Selected Plan */

const planName =
localStorage.getItem("selectedPlan");

const planPrice =
localStorage.getItem("selectedPrice");

document.getElementById("planName").innerText =
"📦 " + (planName || "No Plan Selected");

document.getElementById("planAmount").innerText =
"💰 " + (planPrice || "0") + " PKR";


/* Payment Method */

const easyBtn =
document.getElementById("easyBtn");

const jazzBtn =
document.getElementById("jazzBtn");

const holderName =
document.getElementById("holderName");

const paymentNumber =
document.getElementById("paymentNumber");

let selectedMethod = "";

let selectedNumber = "";

easyBtn.addEventListener("click",()=>{

selectedMethod = "Easypaisa";

selectedNumber = "03411691040";

holderName.innerText =
"👤 Account Holder: Ramsha bibi";

paymentNumber.innerText =
"📱 Number: " + selectedNumber;

});

jazzBtn.addEventListener("click",()=>{

selectedMethod = "JazzCash";

selectedNumber = "03007182128";

holderName.innerText =
"👤 Account Holder: Muhammad Bilal";

paymentNumber.innerText =
"📱 Number: " + selectedNumber;

});


/* Copy Number */

document
.getElementById("copyBtn")
.addEventListener("click",()=>{

if(selectedNumber===""){

Swal.fire({
icon:"warning",
title:"Select Payment Method First"
});

return;

}

navigator.clipboard.writeText(
selectedNumber
);

Swal.fire({
icon:"success",
title:"Number Copied"
});

});


/* Check Login */

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href="login.html";

}

});


/* Submit Deposit Request */

document
.getElementById("depositForm")
.addEventListener("submit",async(e)=>{

e.preventDefault();

const user =
auth.currentUser;

if(!user){

Swal.fire({
icon:"warning",
title:"Login Required"
});

return;

}

if(selectedMethod===""){

Swal.fire({
icon:"warning",
title:"Select Easypaisa or JazzCash"
});

return;

}

const transactionId =
document.getElementById("transactionId").value;

try{

await addDoc(
collection(db,"depositRequests"),
{

uid:user.uid,

plan:planName,

amount:Number(planPrice),

paymentMethod:selectedMethod,

paymentNumber:selectedNumber,

transactionId:transactionId,

status:"pending",

createdAt:new Date().toISOString()

}
);

Swal.fire({

icon:"success",

title:"Deposit Request Submitted",

text:"Wait For Admin Approval",

confirmButtonColor:"#00e5ff"

}).then(()=>{

window.location.href =
"dashboard.html";

});

}
catch(error){

Swal.fire({

icon:"error",

title:"Error",

text:error.message

});

}

});
</script>
</body>
</html>
