<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>BULFEX ADMIN</title>
<style>
  *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1120;
min-height:100vh;
padding:20px;
overflow-x:hidden;
position:relative;
}

/* Background Animation */

.bg-animation{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
overflow:hidden;
background:#0b1120;
}

.bg-animation::before{
content:"";
position:absolute;
width:700px;
height:700px;
background:#00e5ff;
border-radius:50%;
filter:blur(180px);
top:-250px;
left:-250px;
opacity:.4;
animation:glow1 12s linear infinite alternate;
}

.bg-animation::after{
content:"";
position:absolute;
width:700px;
height:700px;
background:#00ff88;
border-radius:50%;
filter:blur(180px);
bottom:-250px;
right:-250px;
opacity:.4;
animation:glow2 12s linear infinite alternate;
}

@keyframes glow1{
0%{transform:translate(0,0);}
100%{transform:translate(250px,250px);}
}

@keyframes glow2{
0%{transform:translate(0,0);}
100%{transform:translate(-250px,-250px);}
}

/* Container */

.admin-container{
position:relative;
z-index:2;
max-width:1100px;
margin:auto;
}

/* Header */

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:42px;
color:#00e5ff;
text-shadow:0 0 20px #00e5ff;
margin-bottom:10px;
}

.header p{
color:#cbd5e1;
font-size:15px;
}

/* Login */

#loginScreen{
max-width:450px;
margin:auto;
padding:25px;
background:#111827;
border-radius:20px;
border:1px solid rgba(0,229,255,.3);
}

#adminPassword{
width:100%;
height:55px;
padding:15px;
background:#1e293b;
border:none;
outline:none;
border-radius:12px;
color:white;
font-size:16px;
margin-bottom:15px;
}

#loginBtn{
width:100%;
height:55px;
border:none;
border-radius:15px;
background:#00e5ff;
color:#111827;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

#loginBtn:hover{
transform:translateY(-2px);
}

/* Stats */

.stats-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.stat-card{
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
border:1px solid rgba(0,229,255,.2);
}

.stat-card h3{
color:#94a3b8;
margin-bottom:10px;
font-size:14px;
}

.stat-card h2{
font-size:32px;
color:#00e5ff;
}

/* Sections */

.section{
position:relative;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
margin-bottom:20px;
overflow:hidden;
}

.section::before{
content:"";
position:absolute;
width:200%;
height:200%;
top:-50%;
left:-50%;
background:conic-gradient(
transparent,
#00e5ff,
transparent,
#00ff88,
transparent
);
animation:borderRotate 6s linear infinite;
}

.section::after{
content:"";
position:absolute;
inset:3px;
background:#111827;
border-radius:18px;
z-index:0;
}

.section *{
position:relative;
z-index:2;
}

@keyframes borderRotate{
100%{
transform:rotate(360deg);
}
}

.section h2{
color:white;
margin-bottom:15px;
}

/* Request Card */

.request-card{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.request-card h3{
color:#00e5ff;
margin-bottom:10px;
}

.request-card p{
color:#cbd5e1;
margin-bottom:6px;
}

/* Buttons */

.approve-btn,
.reject-btn{
width:100%;
height:45px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.approve-btn{
background:#00ff88;
color:#111827;
}

.reject-btn{
background:#ff4d4d;
color:white;
}

/* Mobile */

@media(max-width:768px){

.stats-grid{
grid-template-columns:1fr;
}

.header h1{
font-size:32px;
}

.admin-container{
max-width:100%;
}

}
</style>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script></head><body><div class="bg-animation"></div><div class="admin-container"><div class="header"><h1>BULFEX ADMIN</h1><p>Secure Control Panel</p></div><!-- LOGIN --><div id="loginScreen"><input
type="password"
id="adminPassword"
placeholder="Enter Admin Password">

<button id="loginBtn">
LOGIN
</button></div><!-- ADMIN PANEL --><div id="adminPanel"
style="display:none;"><!-- STATS --><div class="stats-grid"><div class="stat-card">
<h3>Total Users</h3>
<h2 id="totalUsers">0</h2>
</div><div class="stat-card">
<h3>Pending Deposits</h3>
<h2 id="pendingDeposits">0</h2>
</div><div class="stat-card">
<h3>Pending Withdraws</h3>
<h2 id="pendingWithdraws">0</h2>
</div></div><!-- DEPOSIT REQUESTS --><div class="section"><h2>
📥 Deposit Requests
</h2><div id="depositRequests">No Deposit Requests

</div></div><!-- WITHDRAW REQUESTS --><div class="section"><h2>
📤 Withdraw Requests
</h2><div id="withdrawRequests">No Withdraw Requests

</div></div><!-- APPROVED DEPOSITS --><div class="section"><h2>
✅ Approved Deposits
</h2><div id="approvedDeposits">No Approved Deposits

</div></div><!-- APPROVED WITHDRAWS --><div class="section"><h2>
✅ Approved Withdraws
</h2><div id="approvedWithdraws">No Approved Withdraws

</div></div></div></div>
<script type="module">
  import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {

getFirestore,
collection,
doc,
addDoc,
getDoc,
getDocs,
query,
where,
updateDoc,
deleteDoc,
orderBy

}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBp81poxZsi309XEDDBKWmTrzD91Et7lNE",

authDomain: "bulfex.firebaseapp.com",

projectId: "bulfex",

storageBucket: "bulfex.firebasestorage.app",

messagingSenderId: "217833665645",

appId: "1:217833665645:web:c03a94745887a2be033b64"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
const ADMIN_PASSWORD = "gani";

/* LOGIN */

document
.getElementById("loginBtn")
.addEventListener("click", async ()=>{

const pass =
document.getElementById("adminPassword").value;

if(pass !== ADMIN_PASSWORD){

Swal.fire({
icon:"error",
title:"Wrong Password"
});

return;
}

document.getElementById("loginScreen")
.style.display="none";

document.getElementById("adminPanel")
.style.display="block";

await loadStats();
await loadDeposits();
await loadWithdraws();
await loadApprovedDeposits();
await loadApprovedWithdraws();

});


/* STATS */

async function loadStats(){

const usersSnap =
await getDocs(
collection(db,"users")
);

document.getElementById("totalUsers")
.innerText = usersSnap.size;

const depositSnap =
await getDocs(
collection(db,"depositRequests")
);

let pendingDeposits = 0;

depositSnap.forEach((d)=>{

if(d.data().status === "pending"){
pendingDeposits++;
}

});

document.getElementById(
"pendingDeposits"
).innerText =
pendingDeposits;

const withdrawSnap =
await getDocs(
collection(db,"withdrawRequests")
);

let pendingWithdraws = 0;

withdrawSnap.forEach((d)=>{

if(d.data().status === "pending"){
pendingWithdraws++;
}

});

document.getElementById(
"pendingWithdraws"
).innerText =
pendingWithdraws;

}


/* DEPOSIT REQUESTS */

async function loadDeposits(){

const container =
document.getElementById(
"depositRequests"
);

container.innerHTML = "";

const snapshot =
await getDocs(
collection(db,"depositRequests")
);

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

if(data.status !== "pending") return;

container.innerHTML += `

<div class="request-card">

<h3>${data.plan}</h3>

<p>Amount: ${data.amount} PKR</p>

<p>Method: ${data.paymentMethod}</p>

<p>TRX ID: ${data.transactionId}</p>

<button
class="approve-btn"
onclick="approveDeposit(
'${docSnap.id}',
'${data.uid}',
'${data.plan}',
${data.amount}
)">
Approve
</button>

<button
class="reject-btn"
onclick="rejectDeposit(
'${docSnap.id}'
)">
Reject
</button>

</div>

`;

});

}


/* WITHDRAW REQUESTS */

async function loadWithdraws(){

const container =
document.getElementById(
"withdrawRequests"
);

container.innerHTML = "";

const snapshot =
await getDocs(
collection(db,"withdrawRequests")
);

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

if(data.status !== "pending") return;

container.innerHTML += `

<div class="request-card">

<h3>${data.name}</h3>

<p>Amount: ${data.amount} PKR</p>

<p>Method: ${data.paymentMethod}</p>

<p>Number: ${data.accountNumber}</p>

<button
class="approve-btn"
onclick="approveWithdraw(
'${docSnap.id}'
)">
Approve
</button>

<button
class="reject-btn"
onclick="rejectWithdraw(
'${docSnap.id}'
)">
Reject
</button>

</div>

`;

});

}


/* APPROVE DEPOSIT */

window.approveDeposit =
async function(
requestId,
uid,
plan,
amount
){

try{

await updateDoc(
doc(db,"depositRequests",requestId),
{
status:"approved"
}
);
const oldUserSnap =
await getDoc(
doc(db,"users",uid)
);

const oldUserData =
oldUserSnap.data();

await updateDoc(
doc(db,"users",uid),
{

balance:
(oldUserData.balance || 0)
+ amount,

totalDeposit:
(oldUserData.totalDeposit || 0)
+ amount,

activePlan: plan,

planAmount: amount,

planStatus:"active",

planStartDate:
new Date().toISOString()

}
);
// Referral Bonus

const userSnap =
await getDoc(
doc(db,"users",uid)
);

const userData =
userSnap.data();

if(userData.referredBy && !userData.firstDepositReward){

const q =
query(
collection(db,"users"),
where("myCode","==",userData.referredBy)
);

const refSnap =
await getDocs(q);

if(!refSnap.empty){

const refDoc =
refSnap.docs[0];

const refData =
refDoc.data();

const commission =
amount * 0.08;

await updateDoc(
refDoc.ref,
{

referralIncome:
(refData.referralIncome||0)
+ commission,

profit:
(refData.profit||0)
+ commission,

balance:
(refData.balance||0)
+ commission,

totalReferrals:
(refData.totalReferrals||0)
+ 1

}
);

await addDoc(
collection(db,"referralHistory"),
{

referrerUid:
refDoc.id,

name:
userData.name,

deposit:
amount,

commission:
commission,

date:
new Date().toLocaleString()

}
);
await updateDoc(
doc(db,"users",uid),
{

firstDepositReward:true

}
);
}

}
Swal.fire({
icon:"success",
title:"Deposit Approved"
});

await loadStats();
await loadDeposits();
await loadApprovedDeposits();

}catch(error){

Swal.fire({
icon:"error",
title:"Error",
text:error.message
});

}

}


/* REJECT DEPOSIT */

window.rejectDeposit =
async function(requestId){

try{

await updateDoc(
doc(db,"depositRequests",requestId),
{
status:"rejected"
}
);

Swal.fire({
icon:"success",
title:"Deposit Rejected"
});

await loadStats();
await loadDeposits();

}catch(error){

Swal.fire({
icon:"error",
title:"Error",
text:error.message
});

}

}


/* APPROVE WITHDRAW */

window.approveWithdraw =
async function(requestId){

try{

await updateDoc(
doc(db,"withdrawRequests",requestId),
{
status:"approved"
}
);

Swal.fire({
icon:"success",
title:"Withdraw Approved"
});

await loadStats();
await loadWithdraws();
await loadApprovedWithdraws();

}catch(error){

Swal.fire({
icon:"error",
title:"Error",
text:error.message
});

}

}


/* REJECT WITHDRAW */

window.rejectWithdraw =
async function(requestId){

try{

await updateDoc(
doc(db,"withdrawRequests",requestId),
{
status:"rejected"
}
);

Swal.fire({
icon:"success",
title:"Withdraw Rejected"
});

await loadStats();
await loadWithdraws();

}catch(error){

Swal.fire({
icon:"error",
title:"Error",
text:error.message
});

}

}


/* APPROVED DEPOSITS */

async function loadApprovedDeposits(){

const container =
document.getElementById(
"approvedDeposits"
);

container.innerHTML = "";

const snapshot =
await getDocs(
collection(db,"depositRequests")
);

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

if(data.status !== "approved") return;

container.innerHTML += `

<div class="request-card">

<h3>${data.plan}</h3>

<p>Amount: ${data.amount} PKR</p>

<p>Status: Approved</p>

</div>

`;

});

}


/* APPROVED WITHDRAWS */

async function loadApprovedWithdraws(){

const container =
document.getElementById(
"approvedWithdraws"
);

container.innerHTML = "";

const snapshot =
await getDocs(
collection(db,"withdrawRequests")
);

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

if(data.status !== "approved") return;

container.innerHTML += `

<div class="request-card">

<h3>${data.name}</h3>

<p>Amount: ${data.amount} PKR</p>

<p>Status: Approved</p>

</div>

`;

});

}
</script>
</body>
</html>
